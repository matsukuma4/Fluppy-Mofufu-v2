
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  #gameWrap {
    position: relative; user-select: none; touch-action: none;
    width: min(480px, 100vw); aspect-ratio: 480 / 520;
  }
  #gameCanvas { display: block; width: 100%; height: 100%; border-radius: 12px; }
  #score {
    position: absolute; top: 3%; left: 50%; transform: translateX(-50%);
    font-size: clamp(18px,5vw,28px); font-weight: 500; color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4); display: none; pointer-events: none;
  }
  #diffBadge {
    position: absolute; top: 3%; right: 4%; font-size: clamp(11px,2.5vw,13px);
    font-weight: 600; padding: 3px 10px; border-radius: 12px; display: none;
    pointer-events: none; letter-spacing: 0.5px;
  }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center; pointer-events: none;
  }
  #panel {
    background: rgba(0,0,0,0.48); border-radius: 20px;
    padding: clamp(16px,4vw,28px) clamp(20px,6vw,36px);
    text-align: center; color: white; pointer-events: all; min-width: 220px;
  }
  #panel h2 { font-size: clamp(20px,5vw,28px); font-weight: 600; margin-bottom: 8px; }
  #panel p  { font-size: clamp(12px,3vw,14px); margin-bottom: 14px; opacity: 0.9; }
  .diff-label { font-size: clamp(11px,2.5vw,13px); margin-bottom: 8px; opacity: 0.8; }
  .diff-btns { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
  .diff-btn {
    border: 2px solid rgba(255,255,255,0.35); border-radius: 20px; padding: 6px 14px;
    font-size: clamp(12px,3vw,14px); cursor: pointer; font-weight: 600;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.55); transition: all 0.15s;
  }
  .diff-btn:active { transform: scale(0.95); }
  .diff-btn.easy.active   { background: #4caf50; border-color: #4caf50; color: white; box-shadow: 0 0 10px rgba(76,175,80,0.7); }
  .diff-btn.normal.active { background: #ff9800; border-color: #ff9800; color: white; box-shadow: 0 0 10px rgba(255,152,0,0.7); }
  .diff-btn.hard.active   { background: #f44336; border-color: #f44336; color: white; box-shadow: 0 0 10px rgba(244,67,54,0.7); }
  .diff-btn.easy:not(.active):hover   { border-color: #4caf50; color: #4caf50; }
  .diff-btn.normal:not(.active):hover { border-color: #ff9800; color: #ff9800; }
  .diff-btn.hard:not(.active):hover   { border-color: #f44336; color: #f44336; }
  .btn {
    background: rgba(255,255,255,0.92); color: #333; border: none;
    border-radius: 24px; padding: clamp(8px,2vw,10px) clamp(20px,5vw,30px);
    font-size: clamp(14px,3.5vw,16px); cursor: pointer; font-weight: 500;
  }
  .btn:active { background: white; transform: scale(0.97); }
</style>

<div id="gameWrap">
  <canvas id="gameCanvas" width="480" height="520"></canvas>
  <div id="score">0</div>
  <div id="diffBadge"></div>
  <div id="overlay">
    <div id="panel">
      <h2>☁️ Flappy モフフ</h2>
      <p>タップまたはスペースキーで羽ばたこう！</p>
      <div class="diff-label">難易度を選択</div>
      <div class="diff-btns">
        <button class="diff-btn easy"          data-diff="easy">イージー</button>
        <button class="diff-btn normal active" data-diff="normal">ノーマル</button>
        <button class="diff-btn hard"          data-diff="hard">ハード</button>
      </div>
      <button class="btn" id="mainBtn">スタート</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 480, H = 520;
const overlay   = document.getElementById('overlay');
const panel     = document.getElementById('panel');
const scoreEl   = document.getElementById('score');
const diffBadge = document.getElementById('diffBadge');

const DIFF_SETTINGS = {
  easy:   { gap: 200, speed: 2.0, label: 'EASY',   bg: 'rgba(76,175,80,0.85)',  color: '#4caf50' },
  normal: { gap: 160, speed: 2.4, label: 'NORMAL', bg: 'rgba(255,152,0,0.85)',  color: '#ff9800' },
  hard:   { gap: 120, speed: 2.9, label: 'HARD',   bg: 'rgba(244,67,54,0.85)', color: '#f44336' },
};
const DIFF_NAMES = { easy: 'イージー', normal: 'ノーマル', hard: 'ハード' };

let currentDiff = 'normal';
let state = 'idle', bird, pipes, score, frame, animId = null;
let bestScores = { easy: 0, normal: 0, hard: 0 };
let clouds = [];
let tick = 0;

function bindDiffBtns(root) {
  root.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentDiff = btn.dataset.diff;
      root.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}
bindDiffBtns(document);
document.getElementById('mainBtn').addEventListener('click', startGame);

let lastFlap = 0;
function tryFlap() {
  const now = Date.now();
  if (now - lastFlap < 80) return;
  lastFlap = now;
  if (state === 'playing') flap();
}
canvas.addEventListener('touchstart', e => { e.preventDefault(); tryFlap(); }, { passive: false });
canvas.addEventListener('click', tryFlap);
document.getElementById('gameWrap').addEventListener('touchstart', e => {
  if (state === 'playing') { e.preventDefault(); tryFlap(); }
}, { passive: false });
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); if (state === 'playing') flap(); }
});

function flap() { bird.vy = -7.8; }

function initClouds() {
  clouds = [];
  for (let i = 0; i < 5; i++)
    clouds.push({ x: Math.random()*W, y: 40+Math.random()*160, r: 18+Math.random()*14, speed: 0.3+Math.random()*0.3 });
}
function resetGame() {
  bird = { x: 110, y: H/2, vy: 0, angle: 0 };
  pipes = []; score = 0; frame = 0; tick = 0;
  initClouds(); scoreEl.textContent = '0';
}
function startGame() {
  resetGame();
  overlay.style.display = 'none';
  scoreEl.style.display = 'block';
  const d = DIFF_SETTINGS[currentDiff];
  diffBadge.textContent = d.label;
  diffBadge.style.background = d.bg;
  diffBadge.style.color = 'white';
  diffBadge.style.display = 'block';
  state = 'playing';
  if (animId) cancelAnimationFrame(animId);
  loop();
}
function showGameOver() {
  state = 'dead';
  if (score > bestScores[currentDiff]) bestScores[currentDiff] = score;
  scoreEl.style.display = 'none';
  diffBadge.style.display = 'none';
  const d = DIFF_SETTINGS[currentDiff];
  const diffBtns = ['easy','normal','hard'].map(k =>
    `<button class="diff-btn ${k}${k===currentDiff?' active':''}" data-diff="${k}">${DIFF_NAMES[k]}</button>`
  ).join('');
  panel.innerHTML = `
    <h2>😵 ゲームオーバー</h2>
    <p>難易度: <span style="color:${d.color};font-weight:700">${d.label}</span>　スコア: ${score}　ベスト: ${bestScores[currentDiff]}</p>
    <div class="diff-label">難易度を選択</div>
    <div class="diff-btns">${diffBtns}</div>
    <button class="btn" id="mainBtn">もう一度！</button>
  `;
  overlay.style.display = 'flex';
  bindDiffBtns(panel);
  const mb = document.getElementById('mainBtn');
  mb.addEventListener('click', startGame);
  mb.addEventListener('touchend', e => { e.preventDefault(); startGame(); }, { passive: false });
}

function spawnPipe() {
  const gap = DIFF_SETTINGS[currentDiff].gap;
  const topH = 70 + Math.random() * (H - gap - 150);
  pipes.push({ x: W+10, topH, gap, passed: false });
}
function checkCollision() {
  const br = 16;
  if (bird.y+br > H-40 || bird.y-br < 0) return true;
  for (const p of pipes) {
    const fw = 54;
    if (bird.x+br > p.x && bird.x-br < p.x+fw) {
      if (bird.y-br < p.topH || bird.y+br > p.topH+p.gap) return true;
    }
  }
  return false;
}

function drawSky() {
  const g = ctx.createLinearGradient(0,0,0,H);
  if(currentDiff === 'easy') {
    // 水中テーマ: 明るい青い海
    g.addColorStop(0,'#003d6b');
    g.addColorStop(0.5,'#0a6ea0');
    g.addColorStop(1,'#0d4f7a');
  } else if(currentDiff === 'normal') {
    // 森テーマ: 明るい緑の森
    g.addColorStop(0,'#1a3a0a');
    g.addColorStop(0.5,'#2d5c14');
    g.addColorStop(1,'#1e4410');
  } else {
    // ハード: 炎の夜空
    g.addColorStop(0,'#1a0a2e');
    g.addColorStop(0.5,'#3d1c5a');
    g.addColorStop(1,'#6b2d2d');
  }
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}
function drawCloud(c) {
  if(currentDiff === 'easy') {
    // 水中: 泡
    ctx.fillStyle='rgba(150,220,255,0.25)';
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(200,240,255,0.3)';
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.fill();
  } else if(currentDiff === 'normal') {
    // 森: 遠くの葉の茂り
    ctx.fillStyle='rgba(30,90,15,0.4)';
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.arc(c.x+c.r*.7,c.y-c.r*.3,c.r*.7,0,Math.PI*2);
    ctx.arc(c.x-c.r*.6,c.y-c.r*.1,c.r*.6,0,Math.PI*2);
    ctx.fill();
  } else {
    ctx.fillStyle='rgba(120,60,80,0.35)';
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.arc(c.x+c.r*.7,c.y-c.r*.3,c.r*.7,0,Math.PI*2);
    ctx.arc(c.x-c.r*.6,c.y-c.r*.1,c.r*.6,0,Math.PI*2);
    ctx.fill();
  }
}
function drawGround() {
  if(currentDiff === 'easy') {
    // 水底: 砂浜
    ctx.fillStyle='#a07840'; ctx.fillRect(0,H-40,W,40);
    // 砂のさざ波
    ctx.strokeStyle='rgba(180,140,80,0.5)';
    ctx.lineWidth=1.5;
    for(let gx=0;gx<W;gx+=24){
      ctx.beginPath();
      ctx.moveTo(gx, H-30);
      ctx.quadraticCurveTo(gx+12, H-34, gx+24, H-30);
      ctx.stroke();
    }
    // 水面の揺らぎ
    ctx.strokeStyle='rgba(100,200,255,0.7)';
    ctx.lineWidth=2;
    ctx.beginPath();
    for(let sx=0;sx<W;sx+=8){
      const sy = H-40 + Math.sin(tick*0.08+sx*0.15)*3;
      sx===0 ? ctx.moveTo(sx,sy) : ctx.lineTo(sx,sy);
    }
    ctx.stroke();
  } else if(currentDiff === 'normal') {
    // 森の地面: 草
    ctx.fillStyle='#1a4008'; ctx.fillRect(0,H-40,W,40);
    ctx.fillStyle='#2a6010'; ctx.fillRect(0,H-40,W,10);
    // 草の葉
    for(let gx=0;gx<W;gx+=10){
      const gh = 8+Math.sin(tick*0.05+gx*0.4)*4;
      ctx.strokeStyle=`rgba(${40+gx%30},${120+gx%40},${20+gx%20},0.8)`;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(gx, H-40);
      ctx.quadraticCurveTo(gx+Math.sin(tick*0.04+gx)*3, H-40-gh, gx+2, H-40-gh-2);
      ctx.stroke();
    }
  } else {
    // ハード: 炎の地面
    ctx.fillStyle='#1a0800'; ctx.fillRect(0,H-40,W,40);
    for(let gx=0;gx<W;gx+=18){
      const gh = 8+Math.sin(tick*0.1+gx*0.3)*4;
      const gg = ctx.createLinearGradient(gx,H-40-gh,gx,H-40);
      gg.addColorStop(0,'rgba(255,100,0,0)');
      gg.addColorStop(1,'rgba(255,60,0,0.7)');
      ctx.fillStyle=gg;
      ctx.beginPath();
      ctx.moveTo(gx,H-40);
      ctx.quadraticCurveTo(gx+5,H-40-gh,gx+9,H-40);
      ctx.fill();
    }
    ctx.fillStyle='#2a0a00'; ctx.fillRect(0,H-34,W,6);
  }
}

// 炎を描画する関数（壁の端に炎をつける）
function drawFlame(x, y, w, h, flipped, t) {
  const count = Math.ceil(w / 14);
  for(let i=0;i<count;i++){
    const fx = x + i*(w/count) + w/(count*2);
    const baseY = flipped ? y : y + h;
    const flameH = 22 + Math.sin(t*0.15 + i*1.2)*8 + Math.cos(t*0.09 + i*0.7)*6;

    // 外炎（オレンジ）
    const g1 = ctx.createLinearGradient(fx, baseY, fx, flipped ? baseY+flameH : baseY-flameH);
    g1.addColorStop(0, 'rgba(255,80,0,0.95)');
    g1.addColorStop(0.5,'rgba(255,160,0,0.7)');
    g1.addColorStop(1, 'rgba(255,220,0,0)');
    ctx.fillStyle = g1;
    ctx.beginPath();
    const tipY = flipped ? baseY+flameH : baseY-flameH;
    const spread = 9;
    ctx.moveTo(fx-spread, baseY);
    ctx.quadraticCurveTo(fx-spread*0.3, (baseY+tipY)/2, fx+Math.sin(t*0.2+i)*3, tipY);
    ctx.quadraticCurveTo(fx+spread*0.3, (baseY+tipY)/2, fx+spread, baseY);
    ctx.fill();

    // 内炎（白〜黄）
    const innerH = flameH * 0.55;
    const g2 = ctx.createLinearGradient(fx, baseY, fx, flipped ? baseY+innerH : baseY-innerH);
    g2.addColorStop(0, 'rgba(255,220,100,0.9)');
    g2.addColorStop(1, 'rgba(255,255,200,0)');
    ctx.fillStyle = g2;
    ctx.beginPath();
    const tipY2 = flipped ? baseY+innerH : baseY-innerH;
    ctx.moveTo(fx-4, baseY);
    ctx.quadraticCurveTo(fx, (baseY+tipY2)/2, fx+Math.sin(t*0.25+i)*2, tipY2);
    ctx.quadraticCurveTo(fx+4, (baseY+tipY2)/2, fx+4, baseY);
    ctx.fill();
  }
}

// ===== ハード: 溶岩壁 =====
function drawLavaWall(x, y, w, h) {
  const wg = ctx.createLinearGradient(x,y,x+w,y);
  wg.addColorStop(0,'#1a0800');
  wg.addColorStop(0.4,'#2d1000');
  wg.addColorStop(1,'#1a0800');
  ctx.fillStyle = wg;
  ctx.fillRect(x,y,w,h);

  const lg = ctx.createLinearGradient(x,y,x+w,y);
  lg.addColorStop(0,'rgba(255,60,0,0.15)');
  lg.addColorStop(0.5,'rgba(255,120,0,0.05)');
  lg.addColorStop(1,'rgba(255,60,0,0.15)');
  ctx.fillStyle=lg;
  ctx.fillRect(x,y,w,h);

  ctx.strokeStyle='rgba(255,80,0,0.4)';
  ctx.lineWidth=1;
  for(let ci=0;ci<3;ci++){
    ctx.beginPath();
    ctx.moveTo(x+w*0.2+ci*w*0.25, y);
    ctx.lineTo(x+w*0.15+ci*w*0.25+5, y+h*0.3);
    ctx.lineTo(x+w*0.25+ci*w*0.25, y+h*0.6);
    ctx.lineTo(x+w*0.2+ci*w*0.25, y+h);
    ctx.stroke();
  }
}

// ===== ノーマル: 木の枝葉壁 =====
function drawTreeWall(x, y, w, h, isTop, t) {
  if(h <= 0) return;
  // 幹（木の本体）
  const tg = ctx.createLinearGradient(x,y,x+w,y);
  tg.addColorStop(0,'#4a2800');
  tg.addColorStop(0.3,'#6b3a0f');
  tg.addColorStop(0.7,'#5a3208');
  tg.addColorStop(1,'#3d2000');
  ctx.fillStyle = tg;
  ctx.fillRect(x, y, w, h);

  // 樹皮テクスチャ（縦線）
  ctx.strokeStyle='rgba(30,12,0,0.5)';
  ctx.lineWidth=2;
  for(let bi=0;bi<4;bi++){
    const bx = x + 8 + bi*12;
    ctx.beginPath();
    ctx.moveTo(bx, y);
    ctx.bezierCurveTo(bx+3, y+h*0.3, bx-2, y+h*0.6, bx+1, y+h);
    ctx.stroke();
  }
  // 苔（緑の斑点）
  const mossColors = ['rgba(60,110,20,0.5)','rgba(80,140,30,0.4)','rgba(40,90,10,0.45)'];
  for(let mi=0;mi<6;mi++){
    ctx.fillStyle = mossColors[mi%3];
    ctx.beginPath();
    ctx.ellipse(x+8+mi*7, y + (isTop ? h*0.7+mi%3*8 : h*0.1+mi%3*8), 5+mi%2*3, 3, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // 葉の房（端に茂る）
  const leafEdgeY = isTop ? y + h : y;
  const leafCount = Math.ceil(w / 10);
  for(let li=0; li<leafCount; li++){
    const lx = x + li*(w/leafCount) + w/(leafCount*2);
    const sway = Math.sin(t*0.04 + li*0.8) * 4;
    const lh = 28 + Math.sin(t*0.06 + li*1.1)*6 + li%3*4;

    // 大きな葉の塊
    const leafColors = ['#2d7a1f','#3a9926','#226614','#4ab530'];
    for(let ci=0;ci<3;ci++){
      ctx.fillStyle = leafColors[ci % leafColors.length];
      ctx.beginPath();
      const ly = isTop ? leafEdgeY - ci*8 : leafEdgeY + ci*8;
      const tipY = isTop ? leafEdgeY - lh + ci*4 : leafEdgeY + lh - ci*4;
      ctx.ellipse(lx + sway + ci*3 - 3, (ly+tipY)/2, 9+ci*2, Math.abs(tipY-ly)/2, 0, 0, Math.PI*2);
      ctx.fill();
    }
    // 葉脈
    ctx.strokeStyle='rgba(20,60,10,0.3)';
    ctx.lineWidth=0.8;
    ctx.beginPath();
    const tipY2 = isTop ? leafEdgeY - lh : leafEdgeY + lh;
    ctx.moveTo(lx+sway, leafEdgeY);
    ctx.quadraticCurveTo(lx+sway+2, (leafEdgeY+tipY2)/2, lx+sway, tipY2);
    ctx.stroke();
  }

  // 縁取り
  ctx.strokeStyle='rgba(20,80,0,0.7)';
  ctx.lineWidth=2;
  ctx.strokeRect(x, y, w, h);
}

// ===== イージー: 水柱壁 =====
function drawWaterWall(x, y, w, h, isTop, t) {
  if(h <= 0) return;
  // 水の本体
  const wg = ctx.createLinearGradient(x,y,x,y+h);
  wg.addColorStop(0,'#0a4a7a');
  wg.addColorStop(0.4,'#1060a0');
  wg.addColorStop(1,'#0d3a6a');
  ctx.fillStyle = wg;
  ctx.fillRect(x, y, w, h);

  // 水の光沢（縦のハイライト）
  const shineG = ctx.createLinearGradient(x,y,x+w,y);
  shineG.addColorStop(0,'rgba(255,255,255,0.03)');
  shineG.addColorStop(0.3,'rgba(100,200,255,0.18)');
  shineG.addColorStop(0.7,'rgba(255,255,255,0.08)');
  shineG.addColorStop(1,'rgba(255,255,255,0.03)');
  ctx.fillStyle = shineG;
  ctx.fillRect(x, y, w, h);

  // 泡
  ctx.fillStyle='rgba(180,230,255,0.5)';
  for(let bi=0;bi<5;bi++){
    const bx = x + 6 + bi*10;
    const phase = (t*0.03 + bi*0.7) % 1;
    const by = isTop ? y + phase*h : y + h - phase*h;
    const br = 2 + bi%3;
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
  }

  // 波紋（端）
  const waveEdgeY = isTop ? y + h : y;
  const waveCount = Math.ceil(w / 10);
  for(let wi=0; wi<waveCount; wi++){
    const wx = x + wi*(w/waveCount);
    const ww = w/waveCount;
    const wh = 14 + Math.sin(t*0.08 + wi*0.9)*6;
    const waveG = ctx.createLinearGradient(wx, waveEdgeY, wx, isTop ? waveEdgeY - wh : waveEdgeY + wh);
    waveG.addColorStop(0,'rgba(80,180,255,0.9)');
    waveG.addColorStop(0.5,'rgba(40,140,220,0.6)');
    waveG.addColorStop(1,'rgba(100,200,255,0)');
    ctx.fillStyle = waveG;
    ctx.beginPath();
    if(isTop){
      ctx.moveTo(wx, waveEdgeY);
      ctx.quadraticCurveTo(wx+ww*0.5, waveEdgeY - wh, wx+ww, waveEdgeY);
    } else {
      ctx.moveTo(wx, waveEdgeY);
      ctx.quadraticCurveTo(wx+ww*0.5, waveEdgeY + wh, wx+ww, waveEdgeY);
    }
    ctx.fill();
  }

  // 水面の白い泡ライン
  ctx.strokeStyle='rgba(180,230,255,0.6)';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let si=0;si<w;si+=8){
    const sy = waveEdgeY + Math.sin(t*0.1+si*0.2)*(isTop?-3:3);
    si===0 ? ctx.moveTo(x+si, sy) : ctx.lineTo(x+si, sy);
  }
  ctx.stroke();

  // 縁取り
  ctx.strokeStyle='rgba(100,200,255,0.8)';
  ctx.lineWidth=2;
  ctx.strokeRect(x, y, w, h);
}

function drawPipe(p, t) {
  const PW = 54;
  const diff = currentDiff;
  const botY = p.topH + p.gap;
  const botH = H - botY;

  if(diff === 'hard') {
    // ハード: 溶岩＋炎
    if(p.topH > 0) {
      drawLavaWall(p.x, 0, PW, p.topH);
      drawFlame(p.x, p.topH, PW, 0, false, t);
    }
    if(botH > 0){
      drawLavaWall(p.x, botY, PW, botH);
      drawFlame(p.x, botY, PW, 0, true, t);
    }
    ctx.strokeStyle='rgba(255,100,0,0.6)';
    ctx.lineWidth=2;
    ctx.strokeRect(p.x, 0, PW, p.topH);
    ctx.strokeRect(p.x, botY, PW, botH);

  } else if(diff === 'normal') {
    // ノーマル: 木の枝葉
    if(p.topH > 0) drawTreeWall(p.x, 0, PW, p.topH, true, t);
    if(botH > 0)   drawTreeWall(p.x, botY, PW, botH, false, t);

  } else {
    // イージー: 水
    if(p.topH > 0) drawWaterWall(p.x, 0, PW, p.topH, true, t);
    if(botH > 0)   drawWaterWall(p.x, botY, PW, botH, false, t);
  }
}

function drawSheep(x,y,angle,t) {
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  function wing(side){
    // 両翼が同じ方向に同期して羽ばたく（flapの符号をsideに依存させない）
    const flap = Math.sin(t * .18) * .55;
    ctx.save();
    ctx.scale(side, 1);
    ctx.translate(12, -4);
    ctx.rotate(flap); // sideを掛けない → 左右とも同じ角度で上下
    ctx.fillStyle='#f5c200';ctx.beginPath();ctx.ellipse(14,0,17,9,-.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e8b000';
    for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(6+i*6,-4+Math.sin(i*.9)*3,5,3.5,-.3,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
  wing(-1);wing(1);
  ctx.fillStyle='#fffde8';ctx.beginPath();ctx.ellipse(0,0,24,22,0,0,Math.PI*2);ctx.fill();
  [[-14,-8,9],[-6,-16,8],[6,-15,8],[15,-7,9],[-18,2,8],[18,2,8],[-12,10,8],[0,14,7],[12,10,8]].forEach(([bx,by,br])=>{
    ctx.fillStyle='#fffde8';ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='#f5f0c0';ctx.beginPath();ctx.arc(-8,-5,5,0,Math.PI*2);ctx.arc(8,-5,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5a3a1a';ctx.beginPath();ctx.arc(-8,-5,3.2,0,Math.PI*2);ctx.arc(8,-5,3.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(-6.5,-6.5,1.2,0,Math.PI*2);ctx.arc(9.2,-6.5,1.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff9999';ctx.beginPath();ctx.ellipse(-10,-1,4,2.5,.2,0,Math.PI*2);ctx.ellipse(10,-1,4,2.5,-.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8a898';ctx.beginPath();ctx.ellipse(0,4,3,2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f5c200';
  for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(-9+i*6,20,4,5,0,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

function loop() {
  if (state !== 'playing') return;
  frame++; tick++;
  const spd = DIFF_SETTINGS[currentDiff].speed;
  bird.vy += 0.48; bird.y += bird.vy;
  bird.angle = Math.max(-0.5, Math.min(1.2, bird.vy*0.07));
  clouds.forEach(c => { c.x -= c.speed; if (c.x+c.r*2 < 0) c.x = W+c.r; });
  if (frame % 80 === 0) spawnPipe();
  pipes.forEach(p => {
    p.x -= spd;
    if (!p.passed && bird.x > p.x+54) { p.passed=true; score++; scoreEl.textContent=score; }
  });
  pipes = pipes.filter(p => p.x+54 > -10);
  if (checkCollision()) { showGameOver(); return; }
  drawSky();
  clouds.forEach(drawCloud);
  pipes.forEach(p => drawPipe(p, tick));
  drawGround();
  drawSheep(bird.x, bird.y, bird.angle, frame);
  animId = requestAnimationFrame(loop);
}

drawSky(); initClouds(); clouds.forEach(drawCloud); drawGround();
drawSheep(110, H/2, 0, 0);
</script>
